services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: meta-minec:latest
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_CHANNEL: stderr
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      SSL_MODE: "off"
    volumes:
      - sqlite-data:/var/www/html/database
      - storage-data:/var/www/html/storage
    depends_on:
      - redis
    networks:
      - dokploy-network
      - internal
    labels:
      # TLS lo termina Traefik (reverse proxy)
      - traefik.enable=true
      - traefik.http.routers.meta-minec.rule=Host(`meta.minec.gob.sv`)
      - traefik.http.routers.meta-minec.entrypoints=websecure
      - traefik.http.routers.meta-minec.tls.certresolver=letsencrypt
      - traefik.http.services.meta-minec.loadbalancer.server.port=8080

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - internal

volumes:
  sqlite-data:
  storage-data:
  redis-data:

networks:
  dokploy-network:
    external: true
  internal:
