# NOTA: en Dokploy se despliega la app vía Dockerfile (tipo "Application").
# Este compose es de REFERENCIA / uso local. En Dokploy, MySQL y Redis se crean
# como servicios/recursos aparte y la app los consume por variables de entorno.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: meta-minec:latest
    environment:
      APP_NAME: "Sistema META"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}          # definir en Dokploy (base64:...)
      APP_URL: ${APP_URL}
      LOG_CHANNEL: stderr
      # Base de datos MySQL
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: meta_minec
      DB_USERNAME: meta_minec
      DB_PASSWORD: ${DB_PASSWORD}
      # Sesión y caché en archivo
      SESSION_DRIVER: file
      CACHE_STORE: file
      # Colas: Redis (supervisadas por Horizon)
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      SSL_MODE: "off"
      # SSO Azure AD
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_REDIRECT_URI: ${APP_URL}/auth/azure/callback
      # Sembrar la BD en el arranque (solo primer deploy; luego "false")
      AUTORUN_LARAVEL_SEED: "false"
      # Acceso demo temporal (opcional)
      DEMO_LOGIN_ENABLED: "false"
    volumes:
      - storage-data:/var/www/html/storage
    depends_on:
      - mysql
      - redis
    networks:
      - dokploy-network
      - internal
    labels:
      - traefik.enable=true
      - traefik.http.routers.meta-minec.rule=Host(`minec.hrm.com.do`)
      - traefik.http.routers.meta-minec.entrypoints=websecure
      - traefik.http.routers.meta-minec.tls.certresolver=letsencrypt
      - traefik.http.services.meta-minec.loadbalancer.server.port=8080

  mysql:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: meta_minec
      MARIADB_USER: meta_minec
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - internal

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - internal

volumes:
  storage-data:
  mysql-data:
  redis-data:

networks:
  dokploy-network:
    external: true
  internal:
